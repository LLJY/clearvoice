# ClearVoice Speaker Enhancement Chain
# Signal flow: Input → Bass Enhancer → EQ → Stereo Widener → Limiter → Output
#
# Tuned for: Aftershock GX4HRXL (Conexant SN6140 codec)
# Requires: calf-plugins (LV2)

context.properties = { log.level = 0 }
context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    support.*       = support/libspa-support
}
context.modules = [
    { name = libpipewire-module-rt
        args = { nice.level = -11 }
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "ClearVoice Speakers"
            media.name       = "ClearVoice Speakers"
            filter.graph = {
                nodes = [
                    # 1. Psychoacoustic bass (missing fundamental)
                    #    Generates harmonics of sub-bass so brain perceives bass
                    #    that tiny laptop speakers physically cannot produce.
                    #    level_in=-3dB to give headroom for harmonic generation.
                    {
                        type   = lv2
                        name   = bass
                        plugin = "http://calf.sourceforge.net/plugins/BassEnhancer"
                        control = {
                            "bypass"       = 0
                            "level_in"     = 0.7
                            "level_out"    = 1.0
                            "amount"       = 1.0
                            "drive"        = 2.0
                            "blend"        = 0.0
                            "freq"         = 140.0
                            "floor_active" = 1
                            "floor"        = 35.0
                        }
                    }
                    # 2. Corrective EQ — purely subtractive
                    #    Cut resonances; perceived brightness comes from
                    #    removing mud, not boosting highs. No band exceeds 0dB.
                    #    Calibration ref: speaker_eq.json (Aftershock GX4HRXL)
                    {
                        type   = lv2
                        name   = eq
                        plugin = "http://calf.sourceforge.net/plugins/Equalizer8Band"
                        control = {
                            "bypass"    = 0
                            "level_in"  = 1.0
                            "level_out" = 1.0
                            "hp_active" = 0
                            "lp_active" = 0
                            # Low shelf: -2dB below 200Hz
                            #   Bass enhancer already fills this range with
                            #   harmonics; cut the muddy fundamental energy.
                            "ls_active" = 1
                            "ls_level"  = 0.794
                            "ls_freq"   = 200.0
                            # High shelf: off (no boost)
                            "hs_active" = 0
                            # P1: -5dB at 800Hz Q1.2 (speaker box resonance)
                            "p1_active" = 1
                            "p1_level"  = 0.562
                            "p1_freq"   = 800.0
                            "p1_q"      = 1.2
                            # P2: -4dB at 1.5kHz (nasal/honk)
                            "p2_active" = 1
                            "p2_level"  = 0.631
                            "p2_freq"   = 1500.0
                            "p2_q"      = 1.0
                            # P3: -2dB at 3kHz (harshness)
                            #   Ear is most sensitive here (Fletcher-Munson);
                            #   cutting makes the rest sound brighter by contrast.
                            "p3_active" = 1
                            "p3_level"  = 0.794
                            "p3_freq"   = 3000.0
                            "p3_q"      = 0.8
                            # P4: -1.5dB at 5kHz (sibilance/grit)
                            "p4_active" = 1
                            "p4_level"  = 0.841
                            "p4_freq"   = 5000.0
                            "p4_q"      = 0.8
                        }
                    }
                    # 3. Stereo widening
                    #    Laptop speakers are ~6cm apart. This widens the image.
                    #    slev at unity — no side boost, just base widening.
                    {
                        type   = lv2
                        name   = stereo
                        plugin = "http://calf.sourceforge.net/plugins/StereoTools"
                        control = {
                            "bypass"       = 0
                            "level_in"     = 1.0
                            "level_out"    = 1.0
                            "mode"         = 0
                            "stereo_base"  = 0.3
                            "slev"         = 1.0
                            "mlev"         = 1.0
                            "softclip"     = 1
                        }
                    }
                    # 4. Limiter (speaker protection + makeup gain)
                    #    Faster attack (0.5ms) catches guitar/percussion transients.
                    #    level_in=1.8 (+5.1dB) compensates for the subtractive EQ
                    #    and adds perceived loudness above stock.
                    {
                        type   = lv2
                        name   = limiter
                        plugin = "http://calf.sourceforge.net/plugins/Limiter"
                        control = {
                            "bypass"     = 0
                            "level_in"   = 1.8
                            "level_out"  = 1.0
                            "limit"      = 0.89
                            "attack"     = 0.5
                            "release"    = 25.0
                            "asc"        = 1
                            "asc_coeff"  = 0.5
                        }
                    }
                ]
                links = [
                    { output = "bass:out_l"    input = "eq:in_l" }
                    { output = "bass:out_r"    input = "eq:in_r" }
                    { output = "eq:out_l"      input = "stereo:in_l" }
                    { output = "eq:out_r"      input = "stereo:in_r" }
                    { output = "stereo:out_l"  input = "limiter:in_l" }
                    { output = "stereo:out_r"  input = "limiter:in_r" }
                ]
            }
            capture.props = {
                node.name        = "clearvoice_speakers"
                node.description = "ClearVoice Speakers"
                media.class      = Audio/Sink
                audio.rate       = 48000
            }
            playback.props = {
                node.name    = "clearvoice_speakers_out"
                node.passive = true
                audio.rate   = 48000
                target.object = "alsa_output.pci-0000_66_00.6.analog-stereo"
            }
        }
    }
]
