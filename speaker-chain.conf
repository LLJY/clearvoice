# ClearVoice Speaker Enhancement Chain
# Signal flow: Input → Bass Enhancer → EQ → Stereo Widener → Limiter → Output
#
# Tuned for: Aftershock GX4HRXL (Conexant SN6140 codec)
# Requires: calf-plugins (LV2)

context.properties = { log.level = 0 }
context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    support.*       = support/libspa-support
}
context.modules = [
    { name = libpipewire-module-rt
        args = { nice.level = -11 }
        flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }
    { name = libpipewire-module-client-node }
    { name = libpipewire-module-adapter }
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "ClearVoice Speakers"
            media.name       = "ClearVoice Speakers"
            filter.graph = {
                nodes = [
                    # 1. Psychoacoustic bass (missing fundamental)
                    #    Generates harmonics of sub-bass so brain perceives bass
                    #    that tiny laptop speakers physically cannot produce.
                    {
                        type   = lv2
                        name   = bass
                        plugin = "http://calf.sourceforge.net/plugins/BassEnhancer"
                        control = {
                            "bypass"       = 0
                            "level_in"     = 1.0
                            "level_out"    = 1.0
                            "amount"       = 1.4
                            "drive"        = 6.0
                            "blend"        = 0.0
                            "freq"         = 140.0
                            "floor_active" = 1
                            "floor"        = 35.0
                        }
                    }
                    # 2. Corrective EQ
                    #    Tame the 800-2kHz honk, boost presence and air.
                    {
                        type   = lv2
                        name   = eq
                        plugin = "http://calf.sourceforge.net/plugins/Equalizer8Band"
                        control = {
                            "bypass"    = 0
                            "level_in"  = 1.0
                            "level_out" = 1.2
                            "hp_active" = 0
                            "lp_active" = 0
                            "ls_active" = 0
                            # High shelf: +4dB air at 6kHz
                            "hs_active" = 1
                            "hs_level"  = 1.585
                            "hs_freq"   = 6000.0
                            "hs_q"      = 0.7
                            # P1: -3dB at 800Hz (tame honk)
                            "p1_active" = 1
                            "p1_level"  = 0.708
                            "p1_freq"   = 800.0
                            "p1_q"      = 1.0
                            # P2: -2dB at 1.5kHz (tame nasal)
                            "p2_active" = 1
                            "p2_level"  = 0.794
                            "p2_freq"   = 1500.0
                            "p2_q"      = 1.0
                            # P3: +3dB at 3.5kHz (presence)
                            "p3_active" = 1
                            "p3_level"  = 1.413
                            "p3_freq"   = 3500.0
                            "p3_q"      = 1.0
                            # P4: +2dB at 10kHz (sparkle)
                            "p4_active" = 1
                            "p4_level"  = 1.259
                            "p4_freq"   = 10000.0
                            "p4_q"      = 0.8
                        }
                    }
                    # 3. Stereo widening
                    #    Laptop speakers are ~6cm apart. This widens the image.
                    {
                        type   = lv2
                        name   = stereo
                        plugin = "http://calf.sourceforge.net/plugins/StereoTools"
                        control = {
                            "bypass"       = 0
                            "level_in"     = 1.0
                            "level_out"    = 1.0
                            "mode"         = 0
                            "stereo_base"  = 0.3
                            "slev"         = 1.2
                            "mlev"         = 1.0
                            "softclip"     = 1
                        }
                    }
                    # 4. Limiter (speaker protection)
                    #    Fast attack catches bass transients before they clip.
                    {
                        type   = lv2
                        name   = limiter
                        plugin = "http://calf.sourceforge.net/plugins/Limiter"
                        control = {
                            "bypass"     = 0
                            "level_in"   = 1.0
                            "level_out"  = 1.0
                            "limit"      = 0.9
                            "attack"     = 1.0
                            "release"    = 30.0
                            "asc"        = 1
                            "asc_coeff"  = 0.5
                        }
                    }
                ]
                links = [
                    { output = "bass:out_l"    input = "eq:in_l" }
                    { output = "bass:out_r"    input = "eq:in_r" }
                    { output = "eq:out_l"      input = "stereo:in_l" }
                    { output = "eq:out_r"      input = "stereo:in_r" }
                    { output = "stereo:out_l"  input = "limiter:in_l" }
                    { output = "stereo:out_r"  input = "limiter:in_r" }
                ]
            }
            capture.props = {
                node.name        = "clearvoice_speakers"
                node.description = "ClearVoice Speakers"
                media.class      = Audio/Sink
                audio.rate       = 48000
            }
            playback.props = {
                node.name    = "clearvoice_speakers_out"
                node.passive = true
                audio.rate   = 48000
                target.object = "alsa_output.pci-0000_66_00.6.analog-stereo"
            }
        }
    }
]
